<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Secure Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="register">
    <header>
        <div class="logo-wrap">
            <i data-lucide="scan-line" style="width: 18px; color: var(--text-main);"></i>
            <div class="logo-text">AURA</div>
        </div>
        <nav>
            <a href="index.html">Surveillance</a>
            <a href="dashboard.html">Hub</a>
            <a href="register.html" class="active">Secure Entry</a>
            <a href="profile.html">Sovereignty</a>
        </nav>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="mono" style="color: var(--text-muted);" id="clock">00:00:00</div>
        </div>
    </header>

    <main class="bento-grid" style="max-width: 900px;">
        <div class="bento-item col-12 reveal" style="padding: 1rem 0;">
            <h1 style="font-size: 2rem;">Identity Provisioning</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Register a new biometric signature.</p>
        </div>

        <div class="bento-item col-12 reveal" style="animation-delay: 0.1s;">
            <div class="bezel-outer">
                <div class="bezel-inner">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <!-- Form Side -->
                        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                            <div>
                                <label style="display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.5rem;">Identity Label</label>
                                <input type="text" id="reg-name" placeholder="e.g. SRIRAM S" style="width: 100%;">
                            </div>
                            <div>
                                <label style="display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.5rem;">Metadata / Batch</label>
                                <input type="text" id="reg-details" placeholder="e.g. CSE / Batch 14" style="width: 100%;">
                            </div>
                            <div style="margin-top: 1rem;">
                                <button onclick="registerStudent()" class="btn-premium" style="width: 100%; justify-content: center; padding: 0.75rem;">
                                    <i data-lucide="fingerprint" style="width: 16px;"></i> Initialize Capture
                                </button>
                                <p id="reg-message" class="mono" style="margin-top: 1rem; text-align: center; font-size: 0.75rem; color: var(--text-muted);"></p>
                            </div>
                        </div>

                        <!-- Preview Side -->
                        <div style="aspect-ratio: 1/1; background: #000; border-radius: var(--radius-md); overflow: hidden; position: relative;">
                            <img id="live-video" src="/video_feed" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.9;">
                            <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none;">
                                <div style="width: 60%; height: 60%; border: 1px solid rgba(255, 255, 255, 0.4); border-radius: var(--radius-lg);"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
