<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Smart Attendance | Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="register">

  <header class="bb-header">
    <div class="bb-logo">SMART<span>ATTENDANCE</span></div>
    <nav class="bb-nav">
      <a href="index.html">Monitor</a>
      <a href="dashboard.html">Hub</a>
      <a href="register.html" class="active">Register</a>
      <a href="profile.html">Profiles</a>
    </nav>
  </header>

  <main class="bb-main" style="max-width: 800px;">
    <h1 style="font-size: 40px; font-weight: 900; margin-bottom: 40px; text-align: center;">SECURE <span style="color: var(--accent-lime);">ENTRY.</span></h1>

    <div class="bb-card" style="padding: 40px;">
      <div style="margin-bottom: 24px;">
        <label style="display: block; font-size: 11px; font-weight: 800; color: var(--text-gray); text-transform: uppercase; margin-bottom: 8px;">Student Full Name</label>
        <input type="text" id="reg-name" class="bb-input" style="width: 100%;" placeholder="e.g. SRIRAM S">
      </div>

      <div style="margin-bottom: 24px;">
        <label style="display: block; font-size: 11px; font-weight: 800; color: var(--text-gray); text-transform: uppercase; margin-bottom: 8px;">Department / Batch</label>
        <input type="text" id="reg-details" class="bb-input" style="width: 100%;" placeholder="e.g. CSE / Batch 14">
      </div>

      <div class="bb-card" style="aspect-ratio: 16/9; margin-bottom: 30px; background: #000; border-color: var(--accent-lime); position: relative; overflow: hidden;">
        <img id="live-video" src="/video_feed" style="width: 100%; height: 100%; object-fit: cover;">
        <canvas id="canvas" class="hidden" style="display:none;"></canvas>
      </div>

      <button class="bb-btn" onclick="registerStudent()" style="width: 100%; height: 56px; font-size: 14px;">Register Identity</button>
      <p id="reg-message" style="margin-top: 20px; text-align: center; font-weight: 700; color: var(--accent-lime);"></p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
