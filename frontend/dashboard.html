<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSlate | Intelligence Hub</title>
  <meta name="description" content="SmartSlate attendance hub — historical records and analytics.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,700;14..32,900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="dashboard">

  <header>
    <a href="index.html" class="logo-wrap">
      <div class="logo-mark"></div>
      <span class="logo-text">SmartSlate</span>
    </a>
    <nav>
      <a href="index.html">Surveillance</a>
      <a href="dashboard.html" class="active">Hub</a>
      <a href="register.html">Register</a>
      <a href="profile.html">Profile</a>
    </nav>
    <div class="header-right">
      <span id="clock">00:00:00</span>
    </div>
  </header>

  <!-- Page Hero -->
  <div class="page-hero reveal">
    <div class="page-eyebrow">Intelligence Hub</div>
    <h1 class="page-title">Data<br>Stream</h1>
  </div>

  <!-- Stats -->
  <div class="section" style="padding-top:0; padding-bottom:0;">
    <div class="stats-grid stagger">
      <div class="stat-cell reveal">
        <span class="stat-label">Present Today</span>
        <div class="stat-value" id="stat-present">—</div>
      </div>
      <div class="stat-cell reveal">
        <span class="stat-label">Total Enrolled</span>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-cell reveal">
        <span class="stat-label">Absent Today</span>
        <div class="stat-value muted" id="stat-absent">—</div>
      </div>
    </div>
  </div>

  <!-- Filter / Controls -->
  <div class="section" style="padding-top:3rem; padding-bottom:0;">
    <div class="filter-bar reveal">
      <div class="form-field">
        <label class="form-label">Search Identity</label>
        <input type="text" id="search-name" placeholder="Name...">
      </div>
      <div class="form-field" style="min-width:160px;">
        <label class="form-label">Filter Month</label>
        <select id="month-select"><option value="">All months</option></select>
      </div>
      <button onclick="searchFromDashboard()" class="btn btn-solid">Search</button>
      <button onclick="loadSelectedMonth()" class="btn">Filter</button>
      <button onclick="generateAIReport()" class="btn" id="export-btn">Export PDF</button>
    </div>
  </div>

  <!-- Historical Table -->
  <div class="section" style="padding-top:3rem;">
    <div class="section-label reveal">Historical Records</div>
    <div class="table-wrap reveal" style="transition-delay:0.1s;">
      <table>
        <thead>
          <tr>
            <th>Identity</th>
            <th>Date</th>
            <th>Time</th>
            <th style="text-align:center">P1</th>
            <th style="text-align:center">P2</th>
            <th style="text-align:center">P3</th>
            <th style="text-align:center">P4</th>
            <th style="text-align:center">P5</th>
            <th style="text-align:center">P6</th>
            <th style="text-align:center">P7</th>
            <th style="text-align:center">P8</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="11" style="text-align:center; color:var(--muted); padding:3rem;">Loading records...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="ai-fab">
    <button class="btn btn-solid" onclick="openChat()">Hub AI</button>
  </div>

  <div class="chat-overlay" id="chat-overlay">
    <div class="chat-header">
      <span class="chat-title">Hub Intelligence</span>
      <button class="btn" onclick="closeChat()">Close</button>
    </div>
    <div class="chat-body" id="chat-messages"></div>
    <div class="chat-footer">
      <input type="text" id="chat-input" placeholder="Query attendance data..." onkeypress="if(event.key==='Enter') sendChat()" style="flex:1">
      <button class="btn btn-solid" onclick="sendChat()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
