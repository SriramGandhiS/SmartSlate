<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Intelligence Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="dashboard">
    <header>
        <div class="logo-wrap">
            <i data-lucide="scan-line" style="width: 18px; color: var(--text-main);"></i>
            <div class="logo-text">AURA</div>
        </div>
        <nav>
            <a href="index.html">Surveillance</a>
            <a href="dashboard.html" class="active">Hub</a>
            <a href="register.html">Secure Entry</a>
            <a href="profile.html">Sovereignty</a>
        </nav>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="mono" style="color: var(--text-muted);" id="clock">00:00:00</div>
        </div>
    </header>

    <main class="bento-grid">
        <div class="bento-item col-12 reveal" style="padding: 1rem 0;">
            <h1 style="font-size: 2rem;">Intelligence Hub</h1>
        </div>

        <div class="bento-item col-4 reveal" style="animation-delay: 0.1s;">
            <div class="bezel-outer">
                <div class="bezel-inner">
                    <span class="stat-label">Verified Today</span>
                    <div class="stat-value mono" id="stat-present">0</div>
                </div>
            </div>
        </div>

        <div class="bento-item col-4 reveal" style="animation-delay: 0.2s;">
            <div class="bezel-outer">
                <div class="bezel-inner">
                    <span class="stat-label">Total Occupancy</span>
                    <div class="stat-value mono" id="stat-total">0</div>
                </div>
            </div>
        </div>

        <div class="bento-item col-4 reveal" style="animation-delay: 0.3s;">
            <div class="bezel-outer">
                <div class="bezel-inner">
                    <span class="stat-label">Absent Alert</span>
                    <div class="stat-value mono" id="stat-absent" style="color: #ef4444;">0</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="bento-item col-12 reveal" style="animation-delay: 0.4s;">
            <div style="display: flex; gap: 1rem; align-items: center;">
                <input type="text" id="search-name" placeholder="Search student identity..." style="flex: 1;">
                <button onclick="searchFromDashboard()" class="btn-premium">
                    <i data-lucide="search" style="width: 14px;"></i> Search
                </button>
                <select id="month-select" style="min-width: 150px;"></select>
                <button onclick="loadSelectedMonth()" class="btn-secondary">Filter</button>
            </div>
        </div>

        <!-- Main Data Stream -->
        <div class="bento-item col-12 reveal" style="animation-delay: 0.5s;">
            <div class="bezel-outer">
                <div class="bezel-inner">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="font-size: 1.1rem;">Historical Data Stream</h3>
                        <button onclick="generateAIReport()" class="btn-secondary" style="font-size: 0.75rem;">
                            <i data-lucide="download" style="width: 12px;"></i> Export PDF
                        </button>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Identity</th>
                                    <th>Date</th>
                                    <th>Timestamp</th>
                                    <th style="text-align:center">P1</th>
                                    <th style="text-align:center">P2</th>
                                    <th style="text-align:center">P3</th>
                                    <th style="text-align:center">P4</th>
                                    <th style="text-align:center">P5</th>
                                    <th style="text-align:center">P6</th>
                                    <th style="text-align:center">P7</th>
                                    <th style="text-align:center">P8</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                <!-- Streamed Data -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="ai-fab reveal" style="animation-delay: 0.6s;">
        <button onclick="toggleChat()" class="btn-premium">
            <i data-lucide="sparkles" style="width: 16px;"></i> Hub AI
        </button>
    </div>

    <div class="chat-overlay" id="chat-overlay">
        <div style="max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; height: 100vh;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 2rem 0;">
                <h2>Hub Intelligence</h2>
                <button onclick="toggleChat()" class="btn-secondary" style="padding: 0.5rem;">
                    <i data-lucide="x" style="width: 16px;"></i>
                </button>
            </div>
            <div id="chat-messages" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; padding-bottom: 2rem;"></div>
            <div style="padding: 1rem 0 2rem;">
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="chat-input" placeholder="Query hub metrics..." style="flex: 1;" onkeypress="if(event.key==='Enter') sendChat()">
                    <button onclick="sendChat()" class="btn-premium">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
