<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Smart Attendance | Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="dashboard">

  <header class="bb-header">
    <div class="bb-logo">SMART<span>ATTENDANCE</span></div>
    <nav class="bb-nav">
      <a href="index.html">Monitor</a>
      <a href="dashboard.html" class="active">Hub</a>
      <a href="register.html">Register</a>
      <a href="profile.html">Profiles</a>
    </nav>
  </header>

  <main class="bb-main">
    <div style="margin-bottom: 40px;">
      <h1 style="font-size: 48px; font-weight: 900; letter-spacing: -2px; color: var(--text-white);">INTELLIGENCE <span style="color: var(--accent-lime);">HUB.</span></h1>
    </div>

    <!-- Stats -->
    <div class="bb-stats-grid" style="margin-bottom: 40px;">
      <div class="bb-stat-item">
        <div class="bb-stat-label">Verified Today</div>
        <div class="bb-stat-value lime" id="stat-present">0</div>
      </div>
      <div class="bb-stat-item">
        <div class="bb-stat-label">Total Occupancy</div>
        <div class="bb-stat-value" id="stat-total">0</div>
      </div>
      <div class="bb-stat-item">
        <div class="bb-stat-label">Absent Alert</div>
        <div class="bb-stat-value danger" id="stat-absent">0</div>
      </div>
    </div>

    <!-- Controls -->
    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
      <input type="text" id="search-name" class="bb-input" style="flex: 1;" placeholder="Search student name...">
      <button class="bb-btn" onclick="searchFromDashboard()">Search</button>
      <select id="month-select" class="bb-input" style="background: var(--bg-card);"></select>
      <button class="bb-btn" onclick="loadSelectedMonth()">Filter</button>
    </div>

    <!-- Table -->
    <div class="bb-card">
      <div class="bb-panel-header">
        <div class="bb-panel-title">HISTORICAL DATA STREAM</div>
        <button class="bb-btn" style="padding: 6px 12px; font-size: 10px;" onclick="generateAIReport()">GENERATE PDF</button>
      </div>
      <div class="bb-table-wrap">
        <table class="bb-table">
          <thead>
            <tr>
              <th>Student</th>
              <th>Date</th>
              <th>Time</th>
              <th style="text-align:center">P1</th>
              <th style="text-align:center">P2</th>
              <th style="text-align:center">P3</th>
              <th style="text-align:center">P4</th>
              <th style="text-align:center">P5</th>
              <th style="text-align:center">P6</th>
              <th style="text-align:center">P7</th>
              <th style="text-align:center">P8</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Data will stream here -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="ai-fab" onclick="toggleChat()">AI</div>

  <div class="chat-overlay" id="chat-overlay">
    <div style="position: absolute; top: 40px; right: 40px; font-size: 40px; cursor: pointer;" onclick="toggleChat()">&times;</div>
    <h2 style="font-size: 40px; margin-bottom: 40px;">HUB INTELLIGENCE</h2>
    <div id="chat-messages" style="flex: 1; overflow-y: auto; margin-bottom: 40px; display: flex; flex-direction: column; gap: 20px;"></div>
    <div style="display: flex; gap: 20px;">
      <input type="text" id="chat-input" class="bb-input" style="flex: 1; font-size: 18px;" placeholder="Query hub data..." onkeypress="if(event.key==='Enter') sendChat()">
      <button class="bb-btn" onclick="sendChat()" style="padding: 0 40px;">Execute</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
