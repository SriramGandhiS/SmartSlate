<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSlate | Surveillance</title>
  <meta name="description" content="SmartSlate — AI-powered face recognition attendance system.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,700;14..32,900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="index">

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header>
    <a href="index.html" class="logo-wrap">
      <div class="logo-mark"></div>
      <span class="logo-text">SmartSlate</span>
    </a>
    <nav>
      <a href="index.html" class="active">Surveillance</a>
      <a href="dashboard.html">Hub</a>
      <a href="register.html">Register</a>
      <a href="profile.html">Profile</a>
    </nav>
    <div class="header-right">
      <span id="clock">00:00:00</span>
    </div>
  </header>

  <!-- ── Hero (Javino sticky-scroll hero) ───────────────────────── -->
  <div class="hero">
    <div class="hero-sticky">

      <!-- Orbital SVG — exact Javino atom layout -->
      <div class="orbital-wrap">
        <svg class="orbital-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 6 ellipses at 30° increments -->
          <ellipse class="oe1" cx="100" cy="100" rx="80" ry="25" stroke="rgba(245,245,247,0.15)" stroke-width="0.5"/>
          <ellipse class="oe2" cx="100" cy="100" rx="80" ry="25" stroke="rgba(245,245,247,0.15)" stroke-width="0.5" transform="rotate(30 100 100)"/>
          <ellipse class="oe3" cx="100" cy="100" rx="80" ry="25" stroke="rgba(245,245,247,0.15)" stroke-width="0.5" transform="rotate(60 100 100)"/>
          <ellipse class="oe4" cx="100" cy="100" rx="80" ry="25" stroke="rgba(245,245,247,0.15)" stroke-width="0.5" transform="rotate(90 100 100)"/>
          <ellipse class="oe5" cx="100" cy="100" rx="80" ry="25" stroke="rgba(245,245,247,0.15)" stroke-width="0.5" transform="rotate(120 100 100)"/>
          <ellipse class="oe6" cx="100" cy="100" rx="80" ry="25" stroke="rgba(245,245,247,0.15)" stroke-width="0.5" transform="rotate(150 100 100)"/>
          <!-- Dashed orbit ring -->
          <circle class="orbit-ring" cx="100" cy="100" r="40" fill="none" stroke="rgba(245,245,247,0.25)" stroke-width="0.8" stroke-dasharray="4 4"/>
          <!-- Core dot -->
          <circle cx="100" cy="100" r="3.5" fill="#f5f5f7"/>
        </svg>
      </div>

      <!-- Big editorial type — OVER the orbital -->
      <div class="hero-text">
        <span class="hero-word">Smart</span>
        <span class="hero-word stroke">Slate</span>
      </div>

      <!-- Initiate Sequence scroll CTA -->
      <div class="scroll-cta">
        <span class="scroll-label">Initiate Scan</span>
        <div class="scroll-line"></div>
      </div>

    </div>
  </div>

  <!-- ── Live Feed Section ──────────────────────────────────────── -->
  <div class="section">
    <div class="section-label reveal">Live Optical Feed</div>

    <div class="feed-grid reveal" style="transition-delay:0.08s">
      <!-- Camera stream -->
      <div class="feed-viewport">
        <img id="live-video" src="/video_feed" alt="Live surveillance feed">
        <div class="feed-overlay">
          <div>
            <div class="live-badge">
              <span class="live-dot"></span> LIVE
            </div>
          </div>
          <div></div>
        </div>
      </div>

      <!-- Real-time log -->
      <div class="feed-sidebar">
        <div class="feed-sidebar-header">
          <h3>Verified Today</h3>
        </div>
        <div id="list-present">
          <div class="log-empty">Awaiting optical scan...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Stats Row ──────────────────────────────────────────────── -->
  <div class="section" style="padding-top:0">
    <div class="stats-grid stagger">
      <div class="stat-cell reveal">
        <span class="stat-label">Verified Today</span>
        <div class="stat-value" id="total-verified">—</div>
      </div>
      <div class="stat-cell reveal">
        <span class="stat-label">Attendance Ratio</span>
        <div class="stat-value" id="present-ratio">—</div>
      </div>
      <div class="stat-cell reveal">
        <span class="stat-label">System Node</span>
        <div class="stat-value">X-89</div>
      </div>
    </div>
  </div>

  <!-- ── AI FAB ─────────────────────────────────────────────────── -->
  <div class="ai-fab">
    <button class="btn btn-solid" onclick="openChat()">System AI</button>
  </div>

  <!-- ── Chat Overlay ───────────────────────────────────────────── -->
  <div class="chat-overlay" id="chat-overlay">
    <div class="chat-header">
      <span class="chat-title">SmartSlate Intelligence</span>
      <button class="btn" onclick="closeChat()">Close</button>
    </div>
    <div class="chat-body" id="chat-messages"></div>
    <div class="chat-footer">
      <input type="text" id="chat-input" placeholder="Ask the system..." onkeypress="if(event.key==='Enter') sendChat()" style="flex:1">
      <button class="btn btn-solid" onclick="sendChat()">Send</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
