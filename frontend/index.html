<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Smart Attendance | Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="index">

  <header class="bb-header">
    <div class="bb-logo">SMART<span>ATTENDANCE</span></div>
    <nav class="bb-nav">
      <a href="index.html" class="active">Monitor</a>
      <a href="dashboard.html">Hub</a>
      <a href="register.html">Register</a>
      <a href="profile.html">Profiles</a>
    </nav>
  </header>

  <main class="bb-main">
    <div class="bb-grid">
      <!-- Camera Panel -->
      <div class="bb-card">
        <div class="bb-panel-header">
          <div class="bb-panel-title">LIVE OPTICAL SENSOR</div>
          <div style="color: var(--text-gray); font-size: 12px;" id="clock">00:00:00</div>
        </div>
        <div class="bb-camera-wrap">
          <img id="live-video" src="/video_feed" alt="Camera Feed" crossorigin="anonymous">
        </div>
        <div class="bb-panel-header" style="background: transparent; flex-direction: column; align-items: flex-start; gap: 4px;">
          <div id="api-status" style="font-size: 12px; font-weight: 700; color: var(--accent-lime);">LINK ESTABLISHED</div>
          <div id="cooldown-status" style="font-size: 11px; color: var(--text-gray); font-weight: 600;">NEXT SCAN: READY</div>
        </div>
        <div style="padding: 0 20px 20px;">
          <button class="bb-btn" style="width: 100%; padding: 10px; font-size: 11px;" onclick="location.reload()">REBOOT SYSTEM</button>
        </div>
      </div>

      <!-- Live Roster Panel -->
      <div class="bb-card">
        <div class="bb-panel-header">
          <div class="bb-panel-title">VERIFIED LOG</div>
        </div>
        <div id="list-present" style="max-height: 500px; overflow-y: auto;">
          <!-- Data populated by script.js -->
        </div>
      </div>
    </div>
  </main>

  <div class="ai-fab" onclick="toggleChat()">AI</div>

  <div class="chat-overlay" id="chat-overlay">
    <div style="position: absolute; top: 40px; right: 40px; font-size: 40px; cursor: pointer;" onclick="toggleChat()">&times;</div>
    <h2 style="font-size: 40px; margin-bottom: 40px;">AURA INTELLIGENCE</h2>
    <div id="chat-messages" style="flex: 1; overflow-y: auto; margin-bottom: 40px; display: flex; flex-direction: column; gap: 20px;"></div>
    <div style="display: flex; gap: 20px;">
      <input type="text" id="chat-input" class="bb-input" style="flex: 1; font-size: 18px;" placeholder="Query system data..." onkeypress="if(event.key==='Enter') sendChat()">
      <button class="bb-btn" onclick="sendChat()" style="padding: 0 40px;">Execute</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
